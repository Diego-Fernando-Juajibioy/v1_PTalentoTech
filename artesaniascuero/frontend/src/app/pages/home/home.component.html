<div class="home mt-4">
  <header class="home-header">
    <h1>Artesanias Cuero</h1>
    <p class="subtitle">Bienvenido a dashboard de artesanías de cuero</p>
    <button class="btn btn-primary" (click)="logout()">Cerrar sesión</button>
  </header>

  <div class="menu">

    <div class="card">
      <h3>Productos</h3>
      <p>Gestionar productos de cuero</p>
    </div>

    <div class="card">
      <h3>Materiales</h3>
      <p>Inventario de materiales</p>
    </div>

    <div class="card">
      <h3>Pedidos</h3>
      <p>Ver pedidos de clientes</p>
    </div>

        <!-- SOLO ADMIN -->
    <div class="card" *ngIf="role === 'ADMIN'">
      <h3>Usuarios</h3>
      <p>Administrar usuarios</p>
    </div>

  </div>

</div>
