<div class="login-page">
  <div class="login-card">
    <h1>Artesanías en Cuero</h1>
    <p class="subtitle">Sistema de gestión</p>
    <form (ngSubmit)="login()">
      <label>Usuario</label>
      <input 
        type="text"
        [(ngModel)]="username"
        name="username"
        placeholder="Ingrese su usuario"
        required
      >
      <label>Contraseña</label>
      <input
        type="password"
        [(ngModel)]="password"
        name="password"
        placeholder="Ingrese su contraseña"
        required
      >
      <button type="submit">
        Iniciar sesión
      </button>
    </form>
  </div>
</div>
